{% extends "base.html" %}

{% block title %}Вход — {{ get_admin_title() }}{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1>Вход</h1>
        <p class="login-sub">{{ get_admin_title() }}</p>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="post" action="/login" data-loading-text="Вход…">
            <div class="field">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
